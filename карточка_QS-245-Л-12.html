<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QS/245/Л-12 — Шкаф на колесиках</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0d1b2a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #ffffff;
  border-radius: 20px;
  max-width: 420px;
  width: 100%;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.card-top {
  background: linear-gradient(135deg, #0a2540 0%, #1a5276 100%);
  padding: 28px 28px 22px;
  position: relative;
}
.company {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-bottom: 10px;
}
.eq-name {
  font-size: 17px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.4;
  margin-bottom: 18px;
}
.badge-row { display: flex; gap: 8px; flex-wrap: wrap; }
.badge {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-weight: 600;
}
.num-circle {
  position: absolute;
  top: 20px; right: 22px;
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.25);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800;
  color: white;
}
.card-body { padding: 24px 28px; }
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}
.info-row:last-of-type { border-bottom: none; }
.lbl {
  font-size: 11px;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  padding-top: 1px;
}
.val {
  font-size: 14px;
  color: #1a1a2e;
  font-weight: 700;
  text-align: right;
  max-width: 65%;
  line-height: 1.35;
}
.footer {
  background: #f7f9fc;
  border-top: 1px solid #eaeef3;
  padding: 12px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-label { font-size: 10px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
.back-link {
  font-size: 11px;
  color: #1a5276;
  text-decoration: none;
  font-weight: 600;
}
.back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="num-circle">12</div>
    <div class="company">ТОО «QS Azia Sertik» · Лаборатория</div>
    <div class="eq-name">Шкаф на колесиках</div>
    <div class="badge-row">
      <span class="badge">Инв. № QS/245/Л-12</span>
      <span class="badge">Год: 2024</span>
    </div>
  </div>
  <div class="card-body">
    <div class="info-row">
      <span class="lbl">Наименование</span>
      <span class="val">Шкаф на колесиках</span>
    </div>
    <div class="info-row">
      <span class="lbl">Инвентарный №</span>
      <span class="val">QS/245/Л-12</span>
    </div>
    <div class="info-row">
      <span class="lbl">Заводской №</span>
      <span class="val">—</span>
    </div>
    <div class="info-row">
      <span class="lbl">Год выпуска</span>
      <span class="val">2024</span>
    </div>
  </div>
  <div class="footer">
    <span class="footer-label">Оборудование #12 из 30</span>
    <a class="back-link" href="https://emin300790.github.io/QS-AZIA-SERTIK/QR_все_карточки.html">← Все карточки</a>
  </div>
</div>
</body>
</html>
